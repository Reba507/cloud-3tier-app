name: Simple Deploy

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/cloud-3tier-app:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/cloud-3tier-app:latest
    
    - name: Deploy to EC2
      run: |
        aws ssm send-command \
          --document-name "AWS-RunShellScript" \
          --targets "Key=tag:Name,Values=cloud-3tier-app" \
          --parameters 'commands=[
            "docker pull ${{ secrets.DOCKER_USERNAME }}/cloud-3tier-app:latest",
            "docker stop app || true",
            "docker rm app || true",
            "docker run -d --name app -p 80:80 --restart unless-stopped ${{ secrets.DOCKER_USERNAME }}/cloud-3tier-app:latest"
          ]' \
          --region us-east-1
